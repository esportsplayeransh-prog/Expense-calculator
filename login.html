<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="login-mode">

    <div class="login-container">
        <div class="login-box">
            
            <div class="login-header">
                <h2>WELCOME BACK</h2>
                <p>Please enter your details to sign in</p>
            </div>

            <form id="loginForm">
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Enter password" required>
                        
                        <div class="eye-btn" onclick="togglePassword('login-password', 'eye-icon-login')">
                            <svg id="eye-icon-login" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>
                </div>

                <div class="recaptcha-container">
                    <div class="recaptcha-left">
                        <div class="captcha-checkbox" id="captchaBox" onclick="verifyCaptcha()">
                            <span class="checkmark" id="captchaCheck">✔</span>
                            <div class="captcha-spinner" id="captchaSpinner"></div>
                        </div>
                        <p>I'm not a robot</p>
                    </div>
                    
                    <div class="recaptcha-logo">
                        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="logo">
                        <span>reCAPTCHA</span>
                    </div>
                </div>

                <button type="button" class="login-btn" onclick="login()">Login</button>

            </form>

            <div class="footer-text">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>

        </div>
    </div>

    <div id="toast-box"></div>

    <script src="script.js"></script>
</body>
</html>
