<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <h2>EXPENSE APP</h2>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active">
                <span class="material-icons nav-icon">dashboard</span>
                <span class="text">DASHBOARD</span>
            </button>
            <button class="nav-btn">
                <span class="material-icons nav-icon">history</span>
                <span class="text">HISTORY</span>
            </button>
            <button class="nav-btn">
                <span class="material-icons nav-icon">settings</span>
                <span class="text">SETTINGS</span>
            </button>
            <button class="nav-btn logout-btn" onclick="logout()">
                <span class="material-icons nav-icon">logout</span>
                <span class="text">LOGOUT</span>
            </button>
        </nav>
    </div>

    <div class="main-content">
        
        <div class="title-container">
            <div class="welcome-text">
                <h1>Hello, <span id="user-name">User</span>! 👋</h1>
                <p>Welcome back to your financial dashboard.</p>
            </div>
            
            <div class="profile-wrapper" onclick="toggleMenu()">
                <div class="profile-pic" id="profile-initial">U</div>
                <div class="sub-menu-wrap" id="subMenu">
                    <div class="sub-menu">
                        <div class="user-info">
                            <h3 id="dropdown-name">User Name</h3>
                        </div>
                        <hr>
                        
                        <a href="#" class="sub-menu-link">
                            <span class="material-icons">person</span>
                            <p>Edit Profile</p>
                            <span>></span>
                        </a>
                        <a href="#" class="sub-menu-link">
                            <span class="material-icons">settings</span>
                            <p>Settings</p>
                            <span>></span>
                        </a>
                        <a href="#" class="sub-menu-link" onclick="logout()">
                            <span class="material-icons" style="color:red;">logout</span>
                            <p style="color:red;">Logout</p>
                            <span>></span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-container">
            <div class="card total-expense">
                <h3>TOTAL BALANCE</h3>
                <h1 id="total-display">₹ <span id="total-balance">0</span></h1>
            </div>
            <div class="card daily-avg">
                <h3>DAILY AVERAGE</h3>
                <h1>₹ <span id="average-spend">0</span></h1>
            </div>
            <div class="card top-cat">
                <h3>TOP CATEGORY</h3>
                <h1 id="top-category">None</h1>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="chart-section">
                <h3>EXPENSE BREAKDOWN 📊</h3>
                <div class="chart-box">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <div class="transaction-section">
                <div class="recent-header">
                    <h3>RECENT ACTIVITY</h3>
                    <button class="add-btn" onclick="openModal()">+ Add New</button>
                </div>
                <ul id="transaction-list">
                    </ul>
            </div>
        </div>
    </div>

    <div id="expense-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Transaction</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <form id="expenseForm">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="t-title" placeholder="e.g. Momos" required>
                </div>
                <div class="input-group">
                    <label>Amount</label>
                    <input type="number" id="t-amount" placeholder="0.00" required>
                </div>
                <div class="input-group">
                    <label>Type</label>
                    <select id="t-type" class="custom-select">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <button type="submit" class="save-btn">SAVE</button>
            </form>
        </div>
    </div>

    <div id="toast-box"></div>
    <script src="script.js"></script>
</body>
</html>
