<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-mode">

    <div class="login-container">
        <div class="login-box">
            
            <div class="login-header">
                <h2>CREATE ACCOUNT</h2>
                <p>Start tracking your expenses today</p>
            </div>

            <form id="signupForm">
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="john@example.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signup-password" placeholder="Min 8 characters" onkeyup="checkStrength()" required>
                        
                        <div class="eye-btn" onclick="togglePassword('signup-password', 'eye-icon-signup')">
                            <svg id="eye-icon-signup" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>
                    <div class="strength-bar"><div id="strength-fill"></div></div>
                    <p id="strength-text">Password Strength</p>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Re-enter password" required>
                </div>

                <button type="button" class="login-btn" onclick="signup()">Create Account</button>

            </form>

            <div class="footer-text">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <div id="toast-box"></div>
    <script src="script.js"></script>
</body>
</html>
